name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Frontend typecheck and build
        run: |
          cd frontend
          if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi
          npm ci
          npm run typecheck
          npm run build

      - name: Verify Vite manifest exists
        run: scripts/verify_vite_manifest.sh

      - name: Quality gates
        run: |
          python -m compileall -q app tests
          mypy app tests create_hash.py
          ruff check app tests
          pytest -q

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          DEPLOY_PORT: ${{ secrets.PROD_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application via SSH
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          DEPLOY_PORT: ${{ secrets.PROD_PORT }}
          DEPLOY_USER: ${{ secrets.PROD_USER }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          cd "${DEPLOY_PATH:-/opt/IdlePublicProperty}"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          docker compose build --pull
          docker compose up -d
          docker compose ps
          curl -fsS http://127.0.0.1:8000/health
          EOF
